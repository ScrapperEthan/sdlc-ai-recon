<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HASE code assistant</title>
<style>
  :root { --bg:#1d1f23; --panel:#26282d; --ink:#e9e9ec; --muted:#9aa0a8;
          --accent:#6c8cff; --line:#34373d; --user:#2f3a52; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif;
         background:var(--bg); color:var(--ink); height:100vh; display:flex; flex-direction:column; }
  header { padding:12px 18px; border-bottom:1px solid var(--line); font-weight:600; }
  header small { color:var(--muted); font-weight:400; margin-left:8px; }
  #log { flex:1; overflow-y:auto; padding:18px; max-width:900px; width:100%; margin:0 auto; }
  .msg { margin:0 0 16px; }
  .msg .who { font-size:12px; color:var(--muted); margin-bottom:4px; }
  .bubble { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 14px;
            white-space:pre-wrap; word-wrap:break-word; }
  .user .bubble { background:var(--user); }
  .tools { font-size:12px; color:var(--muted); margin-top:6px; }
  .tools code { background:#000; padding:1px 5px; border-radius:4px; }
  form { display:flex; gap:8px; padding:14px 18px; border-top:1px solid var(--line);
         max-width:900px; width:100%; margin:0 auto; }
  textarea { flex:1; resize:none; height:46px; background:var(--panel); color:var(--ink);
             border:1px solid var(--line); border-radius:8px; padding:11px; font:inherit; }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:0 18px;
           font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .hint { color:var(--muted); font-size:13px; }
</style>
</head>
<body>
  <header>HASE code assistant <small>read-only · cites repo/path:line</small></header>
  <div id="log">
    <div class="msg"><div class="bubble hint">Ask about the system across repos, e.g.
      “How does a message get from ingress-api to a tracking job?”,
      “If I change EventPayload, what breaks?”, “Which repos consume otx_bat_letter?”</div></div>
  </div>
  <form id="f">
    <textarea id="q" placeholder="Ask a question…  (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send">Send</button>
  </form>
<script>
const log = document.getElementById('log'), q = document.getElementById('q'),
      f = document.getElementById('f'), send = document.getElementById('send');
const history = [];

function add(role, text, who) {
  const m = document.createElement('div'); m.className = 'msg ' + role;
  m.innerHTML = `<div class="who"></div><div class="bubble"></div>`;
  m.querySelector('.who').textContent = who || role;
  m.querySelector('.bubble').textContent = text;
  log.appendChild(m); log.scrollTop = log.scrollHeight;
  return m;
}

async function ask(text) {
  add('user', text, 'you');
  history.push({role:'user', content:text});
  const pending = add('assistant', '…thinking', 'assistant');
  send.disabled = true;
  try {
    const r = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({question:text, history: history.slice(0,-1)})});
    const d = await r.json();
    if (d.error) { pending.querySelector('.bubble').textContent = 'Error: ' + d.error; }
    else {
      pending.querySelector('.bubble').textContent = d.answer || '(empty)';
      history.push({role:'assistant', content:d.answer || ''});
      if (d.tool_trace && d.tool_trace.length) {
        const t = document.createElement('div'); t.className = 'tools';
        t.innerHTML = 'tools: ' + d.tool_trace.map(x => `<code>${x.tool}</code>`).join(' ');
        pending.appendChild(t);
      }
    }
  } catch (e) { pending.querySelector('.bubble').textContent = 'Request failed: ' + e; }
  send.disabled = false; q.focus();
}

f.addEventListener('submit', e => { e.preventDefault();
  const t = q.value.trim(); if (!t) return; q.value = ''; ask(t); });
q.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); f.requestSubmit(); }});
</script>
</body>
</html>
